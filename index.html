<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورقة المقدم - Family Feud JAWAD</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:#0a0f1e; color:#fff; padding:20px; min-height:100vh; }

#header { text-align:center; padding:18px; margin-bottom:20px; background:linear-gradient(135deg,#001a5c,#000e3a); border:2px solid rgba(255,184,0,0.4); border-radius:16px; position:sticky; top:10px; z-index:100; }
#header h1 { font-size:26px; font-weight:900; background:linear-gradient(180deg,#fff,#FFB800); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
#header p { color:rgba(255,255,255,.4); font-size:12px; margin-top:4px; }

#controls-bar { display:flex; gap:10px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
#search { flex:1; min-width:200px; padding:11px 16px; background:rgba(255,255,255,.07); border:1.5px solid rgba(255,184,0,.3); border-radius:12px; color:#fff; font-size:14px; font-family:'Cairo',sans-serif; outline:none; }
#search:focus { border-color:#FFB800; }
#search::placeholder { color:rgba(255,255,255,.3); }

.filter-btn { font-family:'Cairo',sans-serif; font-weight:700; font-size:13px; padding:10px 16px; border:1.5px solid rgba(255,184,0,.3); background:rgba(255,184,0,.08); color:#FFB800; border-radius:10px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.filter-btn:hover, .filter-btn.active { background:rgba(255,184,0,.25); border-color:#FFB800; }
#counter { font-size:12px; color:rgba(255,255,255,.35); white-space:nowrap; }

#questions-container { display:grid; grid-template-columns:repeat(auto-fill,minmax(460px,1fr)); gap:14px; }
#no-results { display:none; text-align:center; padding:60px; color:rgba(255,255,255,.3); font-size:16px; grid-column:1/-1; }

.q-card { background:linear-gradient(160deg,#0d1b3e,#060f28); border:1.5px solid rgba(0,80,200,.25); border-radius:13px; overflow:hidden; transition:border-color .2s; }
.q-card:hover { border-color:rgba(255,184,0,.35); }
.q-head { padding:11px 15px; background:rgba(0,60,160,.25); border-bottom:1px solid rgba(0,80,200,.15); display:flex; align-items:center; gap:10px; }
.q-num { background:linear-gradient(135deg,#FFB800,#FF7700); color:#000; font-weight:900; font-size:12px; border-radius:7px; padding:3px 9px; flex-shrink:0; }
.q-text { font-size:14px; font-weight:700; flex:1; line-height:1.4; }
.q-answers { padding:9px 13px; display:flex; flex-direction:column; gap:5px; }
.ans-row { display:flex; align-items:center; gap:9px; background:rgba(255,255,255,.04); border-radius:8px; padding:6px 11px; }
.ans-rank { width:20px; height:20px; border-radius:50%; background:rgba(0,80,200,.25); color:rgba(255,255,255,.45); font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.ans-rank.top { background:rgba(255,184,0,.25); color:#FFB800; }
.ans-text { flex:1; font-size:13px; font-weight:600; }
.pts-bar-wrap { width:80px; height:3px; background:rgba(255,255,255,.06); border-radius:2px; flex-shrink:0; }
.pts-bar { height:100%; border-radius:2px; background:linear-gradient(90deg,#FFB800,#FF7700); }
.ans-pts { background:linear-gradient(135deg,#FFB800,#FF7700); color:#000; font-weight:900; font-size:12px; border-radius:6px; padding:3px 8px; min-width:36px; text-align:center; flex-shrink:0; }

#print-btn { position:fixed; bottom:20px; left:20px; z-index:200; font-family:'Cairo',sans-serif; font-weight:700; font-size:13px; padding:11px 20px; background:linear-gradient(135deg,#FFB800,#FF6600); color:#000; border:none; border-radius:25px; cursor:pointer; box-shadow:0 4px 16px rgba(255,184,0,.4); transition:all .2s; }
#print-btn:hover { transform:scale(1.05); }

@media print {
  body { background:#fff; color:#000; padding:8px; }
  #header { background:#f0f0f0; border:1px solid #ccc; position:static; }
  #header h1 { -webkit-text-fill-color:#000; }
  #controls-bar, #print-btn { display:none; }
  #questions-container { grid-template-columns:1fr 1fr; gap:8px; }
  .q-card { background:#f9f9f9; border:1px solid #ddd; break-inside:avoid; }
  .q-head { background:#e8e8e8; }
  .q-num { background:#333; color:#fff; }
  .ans-row { background:#f0f0f0; }
  .ans-pts { background:#333; color:#fff; }
  .pts-bar-wrap { display:none; }
}
</style>
</head>
<body>

<div id="header">
  <h1>🎤 ورقة المقدم — Family Feud JAWAD</h1>
  <p>جميع الأسئلة والإجابات مرتبة حسب النقاط</p>
</div>

<div id="controls-bar">
  <input type="text" id="search" placeholder="🔍 ابحث عن سؤال..." oninput="filterQ()">
  <button class="filter-btn active" id="btn-all"    onclick="setF('all')">الكل (200)</button>
  <button class="filter-btn"        id="btn-first"  onclick="setF('first')">1-50</button>
  <button class="filter-btn"        id="btn-second" onclick="setF('second')">51-100</button>
  <button class="filter-btn"        id="btn-third"  onclick="setF('third')">101-150</button>
  <button class="filter-btn"        id="btn-fourth" onclick="setF('fourth')">151-200</button>
  <span id="counter"></span>
</div>

<div id="questions-container"></div>
<div id="no-results">لا توجد نتائج 🔍</div>

<button id="print-btn" onclick="window.print()">🖨️ طباعة</button>

let cf = 'all', st = '';

function setF(f){
  cf = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + f).classList.add('active');
  draw();
}

function filterQ(){
  st = document.getElementById('search').value.trim();
  draw();
}

function draw(){
  const con = document.getElementById('questions-container');
  const noR = document.getElementById('no-results');
  con.innerHTML = '';

  let list = QS.map((q,i) => ({...q, idx:i}));
  if(cf==='first')  list = list.filter(q => q.idx < 50);
  if(cf==='second') list = list.filter(q => q.idx >= 50 && q.idx < 100);
  if(cf==='third')  list = list.filter(q => q.idx >= 100 && q.idx < 150);
  if(cf==='fourth') list = list.filter(q => q.idx >= 150);
  if(st) list = list.filter(q => q.q.includes(st) || q.a.some(a => a.includes(st)));

  document.getElementById('counter').textContent = list.length + ' سؤال';

  if(!list.length){ noR.style.display='block'; return; }
  noR.style.display='none';

  list.forEach(q => {
    const card = document.createElement('div');
    card.className = 'q-card';

    const head = document.createElement('div');
    head.className = 'q-head';
    head.innerHTML = '<span class="q-num">س ' + (q.idx+1) + '</span><span class="q-text">' + q.q + '</span>';

    const answers = document.createElement('div');
    answers.className = 'q-answers';

    q.a.forEach((ans, i) => {
      const pct = Math.round((q.p[i] / q.p[0]) * 100);
      const row = document.createElement('div');
      row.className = 'ans-row';
      row.innerHTML =
        '<div class="ans-rank ' + (i===0?'top':'') + '">' + (i+1) + '</div>' +
        '<div class="ans-text">' + ans + '</div>' +
        '<div class="pts-bar-wrap"><div class="pts-bar" style="width:' + pct + '%"></div></div>' +
        '<div class="ans-pts">' + q.p[i] + '</div>';
      answers.appendChild(row);
    });

    card.appendChild(head);
    card.appendChild(answers);
    con.appendChild(card);
  });
}

draw();
</script>
